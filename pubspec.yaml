name: billingapp
description: A Flutter Billing & POS App for small retail shops in Pakistan.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  get_it: ^7.6.0
  go_router: ^12.0.0
  mobile_scanner: ^3.5.5
  pdf: ^3.10.7
  printing: ^5.11.0
  equatable: ^2.0.5
  fpdart: ^1.1.0
  uuid: ^4.2.1
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  intl: ^0.18.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
